<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Profesionales - Curanar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #16a34a;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h1>Profesionales disponibles</h1>

<div class="grid">

  <div class="card">
      <img src="img/grimaldiedgardo.JPG">
      <h3>Edgardo Grimaldi</h3>
      <p>Enfermero Profesional</p>
      <p>Zona: CABA</p>
      <p>Disponible: Lunes a Viernes 14hs a 20hs</p>
  </div>

</div>

</body>
</html>
